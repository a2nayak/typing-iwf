name: Bug Report
description: Report a problem
title: "[Bug]: "
labels: ["bug"]

body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the issue?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
